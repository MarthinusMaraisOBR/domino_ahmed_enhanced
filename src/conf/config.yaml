# Complete configuration for Enhanced DoMINO with physics-aware training
# Save this as conf/config_enhanced_v2.yaml

defaults:
  - _self_

# Project configuration
project:
  name: Ahmed_Dataset

exp_tag: enhanced_v2_physics  # New tag for physics-aware version

# Main output directory
project_dir: outputs/${project.name}/
output: outputs/${project.name}/${exp_tag}

hydra:
  run:
    dir: ${output}
  output_subdir: hydra

# Resume directory for checkpoints
# resume_dir: ${output}/models

# Data preprocessing configuration
data_processor:
  kind: ahmed
  output_dir: /data/ahmed_data/processed/train/
  input_dir: /data/ahmed_data/organized/train/fine/
  cached_dir: /data/ahmed_data/ahmed_data/cached/
  use_cache: false
  num_processors: 8

  # Enhanced features configuration
  use_enhanced_features: true
  coarse_input_dir: /data/ahmed_data/organized/train/coarse/

# Solution variables
variables:
  surface:
    solution:
      pMean: scalar
      wallShearStressMean: vector

    # Enhanced features configuration
    enhanced_features:
      input_feature_count: 8  # 4 fine + 4 coarse interpolated features
      coarse_variable_mapping:
        pMean: p
        wallShearStressMean: wallShearStress

  # Volume variables (even if not used, needed for config)
  volume:
    solution:
      UMeanTrim: vector
      pMeanTrim: scalar
      nutMeanTrim: scalar

# Training data configuration
data:
  input_dir: /data/ahmed_data/processed/train/
  input_dir_val: /data/ahmed_data/processed/val/

  # Bounding boxes based on Ahmed geometry
  bounding_box:
    min: [-4.0, -1.0, 0.0]
    max: [6.0, 1.0, 1.4]

  bounding_box_surface:
    min: [-1.5, -0.4, 0.0]
    max: [1.0, 0.4, 0.5]

  gpu_preprocessing: true
  gpu_output: true

# Domain parallelism settings
domain_parallelism:
  domain_size: 1
  shard_grid: false
  shard_points: false

# Model configuration with PHYSICS-AWARE FIXES
model:
  model_type: surface
  activation: "gelu"  # Changed from relu for smoother gradients
  
  # ENABLE PHYSICS-AWARE LOSS
  use_physics_loss: true  # NEW: Enable physics-aware training

  loss_function:
    loss_type: "mse"
    area_weighing_factor: 10000

  interp_res: [128, 64, 64]
  use_sdf_in_basis_func: true
  positional_encoding: false

  # Sampling parameters
  volume_points_sample: 0  # Surface only
  surface_points_sample: 32768
  geom_points_sample: 500_000
  surface_sampling_algorithm: area_weighted
  surface_neighbors: true
  num_surface_neighbors: 7
  use_surface_normals: true
  use_surface_area: true
  integral_loss_scaling_factor: 100
  normalization: min_max_scaling
  encode_parameters: false

  # Loss scaling - reduced for physics loss
  surf_loss_scaling: 0.5  # Further reduced for physics loss
  vol_loss_scaling: 0.0   # Surface only

  geometry_encoding_type: both
  solution_calculation_mode: two-loop

  resampling_surface_mesh:
    resample: false
    points: 1_000_000

  # Geometry representation hyperparameters
  geometry_rep:
    geo_conv:
      base_neurons: 64
      base_neurons_out: 1
      volume_radii: [0.1, 0.5, 2.5, 5.0]
      surface_radii: [0.01, 0.05, 0.1]
      hops: 1
      activation: ${model.activation}
    geo_processor:
      base_filters: 8
      activation: ${model.activation}
    geo_processor_sdf:
      base_filters: 8

  nn_basis_functions:
    base_layer: 512
    fourier_features: false
    num_modes: 5
    activation: ${model.activation}

  local_point_conv:
    activation: ${model.activation}

  aggregation_model:
    base_layer: 512
    activation: ${model.activation}

  position_encoder:
    base_neurons: 512

  geometry_local:
    volume_neighbors_in_radius: [64, 128, 256]
    surface_neighbors_in_radius: [64, 128, 256]
    volume_radii: [0.05, 0.25, 1.0]
    surface_radii: [0.05, 0.25, 1.0]
    base_layer: 512

  # Parameter model configuration
  parameter_model:
    base_layer: 512
    scaling_params: [1.0, 1.0]
    fourier_features: false
    num_modes: 5

  # ENHANCED MODEL V2 - Physics-aware configuration
  enhanced_model:
    surface_input_features: 8
    debug: false  # Reduce logging after testing
    monitor_training: true  # Enable training monitoring

    coarse_to_fine:
      # Simplified architecture for stable training
      hidden_layers: [256, 128]
      use_spectral: false  # Disabled for simplicity
      use_residual: true   # ENABLED with proper constraints
      dropout_rate: 0.2    # Increased regularization
      activation: gelu     # Smoother gradients
      
      # NEW: Weight constraints for physics-aware training
      residual_weight_min: 0.7    # Minimum residual weight
      residual_weight_max: 1.0    # Maximum residual weight
      correction_weight_max: 0.3  # Maximum correction weight

# Training configuration - OPTIMIZED FOR PHYSICS LOSS
train:
  epochs: 400
  checkpoint_interval: 10  # Save more frequently
  learning_rate: 0.0001   # NEW: Lower learning rate for physics loss
  
  dataloader:
    batch_size: 1  # MUST be 1 due to ball query limitation
    pin_memory: false
    
  sampler:
    shuffle: true
    drop_last: false
    
  checkpoint_dir: null  # Start fresh
  
  # NEW: Early stopping configuration
  early_stopping:
    enabled: true
    patience: 20
    min_delta: 0.0001
    metric: mean_error  # Monitor mean error for early stopping
    
  # NEW: Learning rate scheduler
  lr_scheduler:
    enabled: true
    type: ReduceLROnPlateau
    factor: 0.5
    patience: 10
    min_lr: 0.00001

# Validation configuration
val:
  dataloader:
    batch_size: 1
    pin_memory: false
  sampler:
    shuffle: true
    drop_last: false

# Testing/evaluation configuration
eval:
  test_path: /data/ahmed_data/organized/test/fine/
  coarse_test_path: /data/ahmed_data/organized/test/coarse/
  save_path: /data/ahmed_data/predictions_v2/
  checkpoint_name: best_model.pt
  scaling_param_path: outputs/Ahmed_Dataset/enhanced_v2_physics  # Already correct
  refine_stl: false
  stencil_size: 7

# Add/update this section for model loading
resume_dir: outputs/Ahmed_Dataset/enhanced_v2_physics/models/

# NEW: Physics loss configuration
physics_loss:
  mse_weight: 0.4          # Weight for MSE loss
  distribution_weight: 0.3 # Weight for distribution matching
  physics_weight: 0.2      # Weight for physics-based loss
  regularization_weight: 0.1 # Weight for regularization
  
  # Monitoring thresholds
  max_mean_error: 0.5      # Maximum acceptable mean error
  min_improvement: 0.01    # Minimum improvement over baseline
  
  # Gradient clipping
  gradient_clip_norm: 1.0  # Clip gradients to prevent explosions