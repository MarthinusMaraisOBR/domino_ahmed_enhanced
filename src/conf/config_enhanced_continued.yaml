defaults:
  - config_enhanced_fixed
  - _self_

exp_tag: enhanced_continued

# Resume from enhanced_fixed checkpoint
resume_dir: outputs/Ahmed_Dataset/enhanced_fixed/models

# Extended training
train:
  epochs: 500
  checkpoint_interval: 25
  dataloader:
    batch_size: 1
    pin_memory: false
  sampler:
    drop_last: false
    shuffle: true

# Keep the same model config
model:
  integral_loss_scaling_factor: 100
  surf_loss_scaling: 1.0
